---
- name: Check if Homebrew is installed
  ansible.builtin.stat:
    path: /opt/homebrew/bin/brew
  register: homebrew_arm

- name: Check if Homebrew is installed (Intel)
  ansible.builtin.stat:
    path: /usr/local/bin/brew
  register: homebrew_intel

- name: Set Homebrew path (ARM)
  ansible.builtin.set_fact:
    homebrew_path: /opt/homebrew/bin/brew
  when: homebrew_arm.stat.exists

- name: Set Homebrew path (Intel)
  ansible.builtin.set_fact:
    homebrew_path: /usr/local/bin/brew
  when: homebrew_intel.stat.exists and not homebrew_arm.stat.exists

- name: Install Homebrew
  ansible.builtin.shell: |
    /bin/bash -c "$(curl -fsSL https://raw.githubusercontent.com/Homebrew/install/HEAD/install.sh)"
  args:
    creates: /opt/homebrew/bin/brew
  when: not homebrew_arm.stat.exists and not homebrew_intel.stat.exists

- name: Set Homebrew path after install
  ansible.builtin.set_fact:
    homebrew_path: /opt/homebrew/bin/brew
  when: not homebrew_arm.stat.exists and not homebrew_intel.stat.exists

- name: Update Homebrew
  community.general.homebrew:
    update_homebrew: true
  environment:
    PATH: "{{ homebrew_path | dirname }}:{{ ansible_env.PATH }}"

- name: Install Homebrew packages
  community.general.homebrew:
    name: "{{ homebrew_packages }}"
    state: present
  environment:
    PATH: "{{ homebrew_path | dirname }}:{{ ansible_env.PATH }}"

- name: Install Homebrew casks
  community.general.homebrew_cask:
    name: "{{ homebrew_casks }}"
    state: present
  environment:
    PATH: "{{ homebrew_path | dirname }}:{{ ansible_env.PATH }}"
  when: homebrew_casks is defined and homebrew_casks | length > 0
