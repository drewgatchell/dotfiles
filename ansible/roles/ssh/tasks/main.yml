---
- name: Ensure .ssh directory exists with correct permissions
  ansible.builtin.file:
    path: "{{ ansible_env.HOME }}/.ssh"
    state: directory
    mode: '0700'

- name: Check for existing SSH config
  ansible.builtin.stat:
    path: "{{ ansible_env.HOME }}/.ssh/config"
  register: ssh_config

- name: Backup existing SSH config if it's a file (not symlink)
  ansible.builtin.copy:
    src: "{{ ansible_env.HOME }}/.ssh/config"
    dest: "{{ ansible_env.HOME }}/.ssh/config.backup"
    remote_src: true
    mode: '0600'
  when:
    - ssh_config.stat.exists
    - not ssh_config.stat.islnk

- name: Display Bitwarden SSH agent setup instructions
  ansible.builtin.debug:
    msg: |
      ============================================
      Bitwarden SSH Agent Setup
      ============================================
      1. Install Bitwarden Desktop application
      2. Open Bitwarden > Settings > SSH Agent
      3. Enable "SSH Agent"
      4. Add your SSH keys to Bitwarden vault
      5. The zshrc will automatically detect and use the Bitwarden socket
      ============================================
