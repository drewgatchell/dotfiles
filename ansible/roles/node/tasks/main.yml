---
- name: Check if fnm is installed
  ansible.builtin.command: which fnm
  register: fnm_check
  changed_when: false
  failed_when: false

- name: Install fnm via Homebrew (macOS)
  community.general.homebrew:
    name: fnm
    state: present
  when:
    - ansible_os_family == "Darwin"
    - fnm_check.rc != 0
  environment:
    PATH: "/opt/homebrew/bin:/usr/local/bin:{{ ansible_env.PATH }}"

- name: Install fnm via installer (Linux)
  ansible.builtin.shell: |
    curl -fsSL https://fnm.vercel.app/install | bash -s -- --skip-shell
  args:
    creates: "{{ ansible_env.HOME }}/.local/share/fnm/fnm"
  when:
    - ansible_os_family != "Darwin"
    - fnm_check.rc != 0

- name: Install latest LTS Node.js via fnm
  ansible.builtin.shell: |
    eval "$(fnm env)" && fnm install --lts
  args:
    executable: /bin/bash
  environment:
    PATH: "/opt/homebrew/bin:/usr/local/bin:{{ ansible_env.HOME }}/.local/share/fnm:{{ ansible_env.PATH }}"
  register: fnm_node_install
  changed_when: "'installed' in fnm_node_install.stdout"
